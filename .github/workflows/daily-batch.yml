name: Daily picks batch

# Generates the once-a-day shared recommendation artifact and writes it to Supabase.
# Runs on a schedule (and on-demand) instead of Vercel Cron, because the LLM + market
# fetch can exceed a serverless function's timeout — this free runner has no such limit.
# Vercel then just serves the stored result fast.

on:
  schedule:
    # 13:10 UTC on weekdays (≈ US pre-open / KR daytime). Adjust as needed.
    - cron: "10 13 * * 1-5"
  workflow_dispatch: {}

jobs:
  batch:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - name: Generate today's picks (US + KR) → Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Free tier: set the GEMINI_API_KEY secret only and PICKS_PRIMARY=gemini
          # (a repo variable). ANTHROPIC_API_KEY is optional (paid quality/failover).
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PICKS_PRIMARY: ${{ vars.PICKS_PRIMARY }}
        run: |
          npm run batch:daily -- --market US
          npm run batch:daily -- --market KR
      - name: Ingest full-market masters + snapshots (무키 — US Nasdaq · KR Naver)
        # 전종목 마스터 + 당일 스냅샷(종가·등락률·거래량·거래대금)을 무료·무키 공개 소스에서
        # 적재한다(SPEC §3.3-Δ "무료·필요시 크롤링"). 검색·발굴의 데이터 토대.
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          npm run ingest:master:us
          npm run ingest:us:snapshot
          npm run ingest:kr
      - name: Run discovery screener (US + KR, snapshot 기반) → discovery_artifacts
        # 발굴 일배치 (SPEC §3.3-Δ2): 적재된 daily_screen 스냅샷을 정렬·필터만(candle 재수집 0)
        # → 카테고리 선별 → LLM oneshot 1회. LLM 키 없어도 결정론 폴백으로 진행.
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PICKS_PRIMARY: ${{ vars.PICKS_PRIMARY }}
        run: |
          npm run batch:screen -- --market US --from-snapshot
          npm run batch:screen -- --market KR --from-snapshot
      - name: Send daily push digest (US + KR)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Firebase service account for FCM. Without it the digest skips gracefully.
          FCM_SERVICE_ACCOUNT_JSON: ${{ secrets.FCM_SERVICE_ACCOUNT_JSON }}
        run: npm run push:digest
