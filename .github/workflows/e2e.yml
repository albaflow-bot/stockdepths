name: E2E

# Critical user flows for the mobile (Expo Web) client. CI installs all tooling
# (Playwright browsers, Expo deps) — no manual setup (E2E 하네스 계약).

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  mobile-e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - run: npm ci
      - name: Type-check + unit tests
        run: |
          npm run typecheck
          npm test
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run E2E (Expo Web)
        run: npm run e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: mobile/playwright-report/
          retention-days: 7
